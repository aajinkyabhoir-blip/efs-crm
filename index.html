<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>EFS Facade CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090F;--sf:#0C1018;--s2:#111826;--s3:#18202E;
  --b1:#1C2A3E;--b2:#243347;
  --ac:#1D6EE8;--ac2:#4A8FF0;--acg:rgba(29,110,232,.2);
  --go:#C9962A;--go2:#E8B84B;
  --gn:#0EA472;--gn2:#12C78A;
  --am:#E09B1A;--rd:#D94040;--rd2:#EF6060;--pu:#7C4DDB;
  --tx:#DDE4EF;--tx2:#7E93B0;--tx3:#3D5270;
  --fn:'Outfit',sans-serif;--mo:'DM Mono',monospace;
}
body{background:var(--bg);color:var(--tx);font-family:var(--fn);overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px}
input,select,textarea,button{font-family:var(--fn)}button{cursor:pointer}a{color:inherit;text-decoration:none}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:300;flex-direction:column;gap:14px}
.ldlogo{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--ac),#1344A8);display:flex;align-items:center;justify-content:center;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.ldtxt{color:var(--tx3);font-size:13px}
#auth{position:fixed;inset:0;background:var(--bg);display:none;align-items:center;justify-content:center;z-index:200;flex-direction:column}
.acard{background:var(--sf);border:1px solid var(--b2);border-radius:24px;padding:50px 42px;text-align:center;max-width:400px;width:90%;box-shadow:0 0 80px rgba(29,110,232,.07)}
.aicon{width:54px;height:54px;border-radius:16px;background:linear-gradient(135deg,var(--ac),#1344A8);display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.atitle{font-size:24px;font-weight:800;letter-spacing:-.4px;margin-bottom:8px}
.asub{color:var(--tx2);font-size:13px;line-height:1.7;margin-bottom:30px}
.gbtn{display:flex;align-items:center;justify-content:center;gap:12px;background:#fff;color:#1a1a2e;border:none;border-radius:12px;padding:13px 28px;font-size:14px;font-weight:700;width:100%;transition:transform .15s,box-shadow .15s;cursor:pointer}
.gbtn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,.35)}
#wrap{display:none;min-height:100vh}
#sidebar{width:220px;background:var(--sf);border-right:1px solid var(--b1);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50;transition:transform .3s}
#main{margin-left:220px;padding:32px 36px;min-height:100vh}
#hbtn{display:none;position:fixed;top:14px;left:14px;z-index:60;background:var(--sf);border:1px solid var(--b1);border-radius:10px;padding:8px 11px;color:var(--tx);font-size:18px;line-height:1}
#sov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:45}
.slogo{padding:22px 20px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--b1)}
.sic{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--ac),#1344A8);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.snm{font-size:15px;font-weight:800;letter-spacing:-.3px}.srl{font-size:9px;color:var(--tx3);letter-spacing:1.8px;text-transform:uppercase;margin-top:1px}
.snav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.si{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:none;background:transparent;color:var(--tx3);font-size:13px;font-weight:500;text-align:left;width:100%;transition:all .15s;position:relative;cursor:pointer}
.si:hover{background:var(--s2);color:var(--tx2)}.si.on{background:rgba(29,110,232,.12);color:var(--ac2);font-weight:600}
.si.on::before{content:'';position:absolute;left:0;top:22%;bottom:22%;width:3px;background:var(--ac);border-radius:0 3px 3px 0}
.sbdg{margin-left:auto;background:var(--am);color:#000;border-radius:99px;padding:1px 7px;font-size:10px;font-weight:700}
.sfoot{padding:16px 18px;border-top:1px solid var(--b1)}
.susr{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sav{width:32px;height:32px;border-radius:50%;background:var(--ac);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;overflow:hidden;flex-shrink:0}
.sav img{width:100%;height:100%;object-fit:cover}
.sunm{font-size:12px;font-weight:600}.surl{font-size:10px;color:var(--tx3);margin-top:1px}
.pipbar{background:var(--s3);border-radius:4px;height:5px;overflow:hidden;margin-bottom:4px}
.pipfil{height:100%;background:linear-gradient(90deg,var(--ac),var(--go));border-radius:4px;transition:width 1s ease}
.piplbl{font-size:10px;color:var(--go2);font-family:var(--mo)}
.bso{background:none;border:1px solid var(--b1);color:var(--tx3);border-radius:8px;padding:6px 12px;font-size:11px;width:100%;margin-top:10px;transition:all .2s;cursor:pointer}
.bso:hover{border-color:var(--rd);color:var(--rd2)}
.ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:26px;gap:12px;flex-wrap:wrap}
.pt{font-size:24px;font-weight:800;letter-spacing:-.4px}.ps{color:var(--tx3);font-size:13px;margin-top:3px}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:26px}
.scard{background:var(--sf);border:1px solid var(--b1);border-radius:14px;padding:20px 22px;position:relative;overflow:hidden;animation:fu .4s ease both}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--cc,var(--ac))}
.slbl{color:var(--tx3);font-size:10px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;margin-bottom:10px}
.sval{font-size:26px;font-weight:800;letter-spacing:-.5px;line-height:1}.ssub{color:var(--tx3);font-size:11px;margin-top:6px;font-family:var(--mo)}
.btn{display:inline-flex;align-items:center;gap:7px;border:none;border-radius:10px;padding:9px 18px;font-size:13px;font-weight:600;transition:all .15s;cursor:pointer}
.bp{background:var(--ac);color:#fff}.bp:hover{background:var(--ac2);transform:translateY(-1px)}
.bg2{background:var(--s2);border:1px solid var(--b1);color:var(--tx2)}.bg2:hover{border-color:var(--b2);color:var(--tx)}
.bsm{padding:6px 12px;font-size:12px;border-radius:8px}
.bai{background:linear-gradient(135deg,var(--ac),var(--pu));color:#fff;box-shadow:0 0 24px var(--acg)}.bai:hover{transform:translateY(-1px)}
.bwa{background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.25);color:#25D366;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px;cursor:pointer}.bwa:hover{background:rgba(37,211,102,.18)}
.pill{border-radius:99px;padding:3px 10px;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;font-family:var(--mo);white-space:nowrap;display:inline-block}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px}
.pc{background:var(--sf);border:1px solid var(--b1);border-radius:14px;padding:20px;cursor:pointer;transition:border-color .2s,transform .2s;animation:fu .35s ease both}
.pc:hover{border-color:var(--b2);transform:translateY(-2px)}
.pnm{font-size:15px;font-weight:700;margin-bottom:4px;line-height:1.3}.pdv{color:var(--tx2);font-size:12px}
.pmeta{display:flex;justify-content:space-between;align-items:flex-end;margin-top:14px}
.pml{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3);display:block;margin-bottom:3px}
.pmv{font-size:14px;font-weight:700}.gold{color:var(--go2);font-family:var(--mo)}
.pft{margin-top:12px;padding-top:12px;border-top:1px solid var(--b1);color:var(--tx3);font-size:11px;display:flex;align-items:center;gap:6px}
#dov{position:fixed;inset:0;background:rgba(4,8,16,.82);backdrop-filter:blur(10px);z-index:100;display:none;align-items:center;justify-content:flex-end;padding:16px}
#dp{width:min(680px,100%);height:calc(100vh - 32px);background:var(--sf);border:1px solid var(--b2);border-radius:20px;display:flex;flex-direction:column;overflow:hidden;animation:si .3s ease}
@keyframes si{from{transform:translateX(60px);opacity:0}to{transform:translateX(0);opacity:1}}
#dh{padding:20px 24px;border-bottom:1px solid var(--b1);background:linear-gradient(180deg,var(--s2),var(--sf))}
#dt{display:flex;border-bottom:1px solid var(--b1);padding:0 16px;overflow-x:auto}
.dtab{background:none;border:none;padding:12px 15px;font-size:12px;font-weight:600;color:var(--tx3);border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;cursor:pointer}
.dtab.on{color:var(--tx);border-bottom-color:var(--ac)}
#db{flex:1;overflow-y:auto;padding:20px}
#mov{position:fixed;inset:0;background:rgba(4,8,16,.88);backdrop-filter:blur(10px);z-index:150;display:none;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--sf);border:1px solid var(--b2);border-radius:20px;width:min(560px,100%);max-height:90vh;overflow-y:auto;animation:sc .2s ease}
@keyframes sc{from{transform:scale(.93);opacity:0}to{transform:scale(1);opacity:1}}
.mh{padding:22px 26px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--b1)}
.mt{font-size:18px;font-weight:800}.mb{padding:22px 26px}.mf{padding:16px 26px;border-top:1px solid var(--b1);display:flex;gap:10px;justify-content:flex-end}
.fg{margin-bottom:15px}
.fg label{display:block;color:var(--tx3);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.fc{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:9px;padding:10px 13px;color:var(--tx);font-size:13px;transition:border-color .2s;outline:none}
.fc:focus{border-color:var(--ac)}.fc::placeholder{color:var(--tx3)}
select.fc option{background:var(--s2)}textarea.fc{resize:vertical;min-height:78px;line-height:1.6}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.aitm{display:flex;gap:12px;background:var(--s2);border:1px solid var(--b1);border-radius:11px;padding:13px;margin-bottom:8px}
.aibdg{min-width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;background:rgba(29,110,232,.15);flex-shrink:0}
.aitp{display:flex;justify-content:space-between;margin-bottom:3px}
.aityp{font-size:12px;font-weight:600}.aidt{font-size:10px;color:var(--tx3);font-family:var(--mo)}
.ainot{font-size:13px;color:var(--tx2);line-height:1.6}
.ti{display:flex;align-items:center;gap:11px;background:var(--s2);border-radius:11px;padding:12px 15px;margin-bottom:7px;border:1px solid var(--b1);transition:border-color .2s}
.ti.ov{border-color:rgba(217,64,64,.35)}
.tck{width:22px;height:22px;border-radius:6px;border:2px solid var(--b2);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;cursor:pointer}
.tck.dn{background:var(--gn);border-color:var(--gn)}
.ttx{flex:1;font-size:13px;color:var(--tx);transition:color .2s}.ttx.dn{color:var(--tx3);text-decoration:line-through}
.tdu{font-size:10px;font-family:var(--mo);margin-top:2px}
.frow{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.flbl{width:140px;text-align:right;flex-shrink:0}
.fbw{flex:1;background:var(--s2);border-radius:8px;height:44px;position:relative;overflow:hidden}
.fbf{height:100%;border-radius:8px;transition:width 1s ease}
.fbc{position:absolute;inset:0;display:flex;align-items:center;padding:0 10px;gap:7px;overflow:hidden}
.fchp{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:3px 8px;font-size:11px;white-space:nowrap;color:var(--tx)}
.fval{width:84px;text-align:right;font-family:var(--mo);font-size:13px;color:var(--go2);font-weight:600;flex-shrink:0}
.fcnt{width:22px;text-align:center;font-size:13px;font-weight:700;color:var(--tx3);flex-shrink:0}
.aichps{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.aichp{background:var(--s2);border:1px solid var(--b2);color:var(--tx2);border-radius:20px;padding:6px 13px;font-size:11px;cursor:pointer;transition:all .2s}
.aichp:hover{border-color:var(--ac);color:var(--ac2)}
.airesp{background:var(--s2);border:1px solid var(--b1);border-radius:12px;padding:20px;white-space:pre-wrap;font-size:13px;line-height:1.9;color:var(--tx);margin-top:14px;max-height:420px;overflow-y:auto}
.spin{width:38px;height:38px;border:3px solid var(--b1);border-top:3px solid var(--ac);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto}
@keyframes sp{to{transform:rotate(360deg)}}
.ibox{background:var(--s2);border:1px solid var(--b1);border-radius:12px;padding:15px;margin-bottom:13px}
.iblt{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3);margin-bottom:6px;font-weight:700}
.ibv{font-size:13px;color:var(--tx);line-height:1.7}
.sh{font-size:10px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--tx3);margin-bottom:12px}
.empty{text-align:center;padding:44px 20px;color:var(--tx3)}.ei{font-size:34px;margin-bottom:10px}
.fchrow{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.fc2{background:var(--s2);border:1px solid var(--b1);color:var(--tx3);border-radius:99px;padding:5px 13px;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s}
.fc2:hover,.fc2.on{background:rgba(29,110,232,.12);border-color:var(--ac);color:var(--ac2)}
.spbar{display:flex;gap:2px;margin-top:10px}.spseg{flex:1;height:5px;border-radius:3px;transition:background .3s}
#toast{position:fixed;bottom:22px;right:22px;z-index:400;display:flex;flex-direction:column;gap:7px}
.tst{background:var(--sf);border:1px solid var(--b2);border-radius:11px;padding:11px 17px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:9px;animation:fu .3s ease;box-shadow:0 8px 32px rgba(0,0,0,.4);max-width:310px}
.tst.ok{border-left:3px solid var(--gn)}.tst.er{border-left:3px solid var(--rd)}.tst.in{border-left:3px solid var(--ac)}
.alist{display:flex;flex-direction:column;gap:7px;margin-top:8px}
.ait{display:flex;align-items:center;gap:10px;background:var(--s2);border:1px solid var(--b1);border-radius:9px;padding:10px 13px}
.aiic{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;background:var(--s3);flex-shrink:0}
.ainm{font-size:12px;font-weight:600;color:var(--tx);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.aisz{font-size:10px;color:var(--tx3);font-family:var(--mo)}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){
  #sidebar{transform:translateX(-100%)}#sidebar.op{transform:translateX(0)}
  #sov.op{display:block}#main{margin-left:0;padding:18px 14px;padding-top:62px}
  #hbtn{display:block}.pgrid{grid-template-columns:1fr}
  #dp{width:100%;height:100vh;border-radius:0}#dov{padding:0}
  .pt{font-size:20px}.sgrid{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}
  .frow{flex-wrap:wrap}.flbl{width:100%;text-align:left}
}
</style>
</head>

<div id="loading">
  <div class="ldlogo"><svg width="28" height="28" fill="none" stroke="#fff" stroke-width="1.8" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="18" rx="1"/><path d="M2 9h20M8 21V9M16 21V9"/></svg></div>

<div id="auth">

</div>

<div id="sov" onclick="togSB()"></div>
<div id="wrap">
  <div id="sidebar">

  <div id="main"><div id="pg"></div></div>
</div>
<div id="dov" onclick="ovClk(event)"><div id="dp"><div id="dh"></div><div id="dt"></div><div id="db"></div></div></div>

window.addEventListener('load',function(){

async function dReq(path,method,body){
  method=method||'GET';
  var opts={method:method,headers:{Authorization:'Bearer '+S.token}};
  if(body){opts.headers['Content-Type']='application/json';opts.body=JSON.stringify(body);}
  var r=await fetch('https://www.googleapis.com/drive/v3'+path,opts);
  if(!r.ok)throw new Error('Drive '+r.status);
  return r.json();
}
async function dUp(meta,content,fid){
  var bnd='-------EFSCRM';var ms=JSON.stringify(meta);
  var bd='--'+bnd+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+ms+'\r\n--'+bnd+'\r\nContent-Type: application/json\r\n\r\n'+content+'\r\n--'+bnd+'--';
  var url=fid?'https://www.googleapis.com/upload/drive/v3/files/'+fid+'?uploadType=multipart':'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
  var r=await fetch(url,{method:fid?'PATCH':'POST',headers:{Authorization:'Bearer '+S.token,'Content-Type':'multipart/related; boundary="'+bnd+'"'},body:bd});
  return r.json();
}
async function loadOrCreate(){
  try{
    var q1='/files?q=name%3D%27EFS_CRM_Data%27+and+mimeType%3D%27application%2Fvnd.google-apps.folder%27+and+trashed%3Dfalse&fields=files(id)';
    var fr=await dReq(q1);
    if(fr.files&&fr.files.length){S.foldId=fr.files[0].id;}
    else{var f=await dReq('/files','POST',{name:'EFS_CRM_Data',mimeType:'application/vnd.google-apps.folder'});S.foldId=f.id;}
    var q2='/files?q=name%3D%27'+encodeURIComponent(DB_NAME)+'%27+and+%27'+S.foldId+'%27+in+parents+and+trashed%3Dfalse&fields=files(id)';
    var dr=await dReq(q2);
    if(dr.files&&dr.files.length){
      S.dbId=dr.files[0].id;
      var cr2=await fetch('https://www.googleapis.com/drive/v3/files/'+S.dbId+'?alt=media',{headers:{Authorization:'Bearer '+S.token}});
      var d=await cr2.json();S.projects=d.projects||[];
      localStorage.setItem('efs_proj',JSON.stringify(S.projects));
    } else {
      S.projects=seedData();await saveDB();
    }
  }catch(e){
    var cp=localStorage.getItem('efs_proj');
    if(cp){try{S.projects=JSON.parse(cp);}catch(e2){}}
    toast('Working offline - Drive syncs when connected','in');
  }
}
async function saveDB(){
  try{
    var c=JSON.stringify({projects:S.projects,updated:new Date().toISOString()});
    if(S.dbId){await dUp({name:DB_NAME},c,S.dbId);}
    else if(S.foldId){var f=await dUp({name:DB_NAME,parents:[S.foldId]},c);S.dbId=f.id;}
    localStorage.setItem('efs_proj',JSON.stringify(S.projects));
  }catch(e){
    localStorage.setItem('efs_proj',JSON.stringify(S.projects));
    toast('Saved locally (Drive sync pending)','in');
  }
}
async function upFile(file,pid){
  return new Promise(function(res,rej){
    var q='/files?q=name%3D%27proj_'+pid+'%27+and+%27'+S.foldId+'%27+in+parents+and+trashed%3Dfalse&fields=files(id)';
    dReq(q).then(function(fr){
      var pfp;
      if(fr.files&&fr.files.length){pfp=Promise.resolve(fr.files[0].id);}
      else{pfp=dReq('/files','POST',{name:'proj_'+pid,mimeType:'application/vnd.google-apps.folder',parents:[S.foldId]}).then(function(f){return f.id;});}
      pfp.then(function(pfId){
        var rd=new FileReader();
        rd.onload=function(e){
          var b64=e.target.result.split(',')[1];
          var bnd='-------EFSUP';var mt=JSON.stringify({name:file.name,parents:[pfId]});
          var bd='--'+bnd+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+mt+'\r\n--'+bnd+'\r\nContent-Type: '+(file.type||'application/octet-stream')+'\r\nContent-Transfer-Encoding: base64\r\n\r\n'+b64+'\r\n--'+bnd+'--';
          fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{Authorization:'Bearer '+S.token,'Content-Type':'multipart/related; boundary="'+bnd+'"'},body:bd})
          .then(function(r){return r.json();}).then(function(d){
            res({id:d.id,name:file.name,size:file.size,type:file.type,link:'https://drive.google.com/file/d/'+d.id+'/view'});
          }).catch(rej);
        };
        rd.readAsDataURL(file);
      }).catch(rej);
    }).catch(rej);
  });
}

async function pipeAI(q){
  S.aiLoad=true;S.aiResp='';goTo('ai');
  var tot=S.projects.reduce(function(a,b){return a+(+b.value||0);},0);
  var sum=S.projects.map(function(p){return '- '+p.name+' ('+p.developer+') | '+p.stage+' | '+cr(p.value)+' | '+p.system+' | Next: '+p.nextAction+' on '+p.nextDate;}).join('\n');
  var prompt='I am Ajinkya Bhoir, BDM at EFS (Everest Facade Systems), Mumbai. Target: Rs 12 Crore FY2026-27.\n\nPipeline ('+cr(tot)+'):\n'+sum+'\n\nQuestion: '+q+'\n\nBe frank, direct, actionable. Bullet points. What I can do today.';
  try{
    var txt='';
    if(GROQ_KEY&&GROQ_KEY.length>10){
      var r=await fetch(GROQ_URL,{method:'POST',headers:{Authorization:'Bearer '+GROQ_KEY,'Content-Type':'application/json'},body:JSON.stringify({model:GROQ_MODEL,max_tokens:900,messages:[{role:'system',content:'You are a BDM coach for a facade contracting company in Mumbai, India. Be frank, direct, tactical. Use bullet points and emojis.'},{role:'user',content:prompt}]})});

  var prompt='Project: '+p.name+'\nDeveloper: '+p.developer+'\nStage: '+p.stage+'\nValue: '+cr(p.value)+'\nSystem: '+p.system+'\nNotes: '+(p.notes||'')+'\nActivities: '+(p.activities||[]).map(function(a){return a.date+' '+a.type+': '+a.note;}).join('; ')+'\nNext Action: '+p.nextAction+'\nQuestion: '+q;
  try{
    var txt='';
    if(GROQ_KEY&&GROQ_KEY.length>10){
      var r=await fetch(GROQ_URL,{method:'POST',headers:{Authorization:'Bearer '+GROQ_KEY,'Content-Type':'application/json'},body:JSON.stringify({model:GROQ_MODEL,max_tokens:700,messages:[{role:'system',content:'BDM advisor for Mumbai facade company. Be frank, direct, tactical. Use bullets.'},{role:'user',content:prompt}]})});
      var d=await r.json();
      txt=(d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content)||'No response.';
    } else {
      await new Promise(function(r2){setTimeout(r2,1000);});
      txt='Deal: '+p.name+' | Stage: '+p.stage+'\n\nRecommended Next Move:\n- '+p.nextAction+' by '+p.nextDate+' is critical\n- For '+p.developer+': engage both technical and commercial decision-makers\n- Differentiate on quality and execution speed, not just price\n\nAdd your free Groq API key (console.groq.com) for live AI analysis.';
    }
    ar.innerHTML='<div style="background:var(--s2);border:1px solid var(--b1);border-radius:12px;padding:17px;margin-top:12px"><div class="sh" style="margin-bottom:9px">AI RESPONSE</div><div style="font-size:13px;line-height:1.9;color:var(--tx);white-space:pre-wrap">'+esc(txt)+'</div></div>';
  }catch(e){ar.innerHTML='<div style="color:var(--rd2);font-size:13px;padding:14px">AI error: '+esc(e.message)+'</div>';}
}
function togGlTk(pid,tid){
  var p=S.projects.find(function(x){return x.id===pid;});if(!p)return;
  var t=(p.tasks||[]).find(function(x){return x.id===tid;});if(!t)return;
  t.done=!t.done;saveDB().then(function(){renNav();goTo('tasks');toast(t.done?'Task done':'Reopened','ok');});
}
function openAdd(){openMod(null);}function openEdit(){openMod(S.sel);}
function openMod(project){
  var isEdit=!!project;
  var p=project||{name:'',developer:DEVS[0],system:SYSTEMS[0],stage:'Lead',value:'',area:'',contact:'',phone:'',email:'',notes:'',nextAction:'',nextDate:td()};
  var dOpts='',sOpts='',stOpts='';
  for(var i=0;i<DEVS.length;i++) dOpts+='<option'+(DEVS[i]===p.developer?' selected':'')+'>'+esc(DEVS[i])+'</option>';
  for(var j=0;j<SYSTEMS.length;j++) sOpts+='<option'+(SYSTEMS[j]===p.system?' selected':'')+'>'+esc(SYSTEMS[j])+'</option>';
  for(var k=0;k<STAGES.length;k++) stOpts+='<option'+(STAGES[k]===p.stage?' selected':'')+'>'+STAGES[k]+'</option>';
  var h='';
  h+='<div class="mh"><div class="mt">'+(isEdit?'Edit Project':'New Deal')+'</div><button class="btn bg2 bsm" onclick="closeMod()">&#10005;</button></div>';
  h+='<div class="mb">';
  h+='<div class="g2"><div class="fg"><label>Project Name *</label><input class="fc" id="mn" value="'+esc(p.name)+'" placeholder="e.g. Lodha Palava Tower 9"/></div>';
  h+='<div class="fg"><label>Value (Rs Crore)</label><input class="fc" id="mv" type="number" step="0.01" value="'+esc(p.value||'')+'" placeholder="e.g. 2.5"/></div></div>';
  h+='<div class="g2"><div class="fg"><label>Developer</label><select class="fc" id="mdev">'+dOpts+'</select></div>';
  h+='<div class="fg"><label>Facade System</label><select class="fc" id="msys">'+sOpts+'</select></div></div>';
  h+='<div class="g2"><div class="fg"><label>Stage</label><select class="fc" id="mstg">'+stOpts+'</select></div>';
  h+='<div class="fg"><label>Area / Location</label><input class="fc" id="mar" value="'+esc(p.area)+'" placeholder="e.g. Thane"/></div></div>';
  h+='<div class="g2"><div class="fg"><label>Contact Person</label><input class="fc" id="mco" value="'+esc(p.contact)+'" placeholder="Full name"/></div>';
  h+='<div class="fg"><label>Phone</label><input class="fc" id="mph" value="'+esc(p.phone)+'" placeholder="9XXXXXXXXX"/></div></div>';
  h+='<div class="fg"><label>Email</label><input class="fc" id="mem" value="'+esc(p.email||'')+'" placeholder="contact@developer.com"/></div>';
  h+='<div class="g2"><div class="fg"><label>Next Action</label><input class="fc" id="mna" value="'+esc(p.nextAction||'')+'" placeholder="What to do next?"/></div>';
  h+='<div class="fg"><label>Date</label><input type="date" class="fc" id="mnd" value="'+(p.nextDate||td())+'"/></div></div>';
  h+='<div class="fg"><label>Notes</label><textarea class="fc" id="mno" placeholder="Project context, key people...">'+esc(p.notes||'')+'</textarea></div>';
  h+='</div><div class="mf"><button class="btn bg2" onclick="closeMod()">Cancel</button>';
  h+='<button class="btn bp" onclick="saveMod(\''+(isEdit?p.id:'')+'\')">'+( isEdit?'Save Changes':'Create Deal')+'</button></div>';
  document.getElementById('mbox').innerHTML=h;sho('mov','flex');
}
function closeMod(){hide('mov');}
function movClk(e){if(e.target===document.getElementById('mov'))closeMod();}
function gv(id){var el=document.getElementById(id);return el?el.value:'';}
function saveMod(eid){
  var name=gv('mn').trim();if(!name){toast('Project name required','er');return;}
  var data={name:name,value:parseFloat(gv('mv'))||0,developer:gv('mdev'),system:gv('msys'),stage:gv('mstg'),area:gv('mar'),contact:gv('mco'),phone:gv('mph'),email:gv('mem'),notes:gv('mno'),nextAction:gv('mna'),nextDate:gv('mnd')};
  if(eid){
    var p=S.projects.find(function(x){return x.id===eid;});
    if(p){Object.assign(p,data);if(S.sel&&S.sel.id===eid)S.sel=p;}
  } else {
    var np=Object.assign({id:uid(),lastActivity:'Deal created',activities:[],tasks:[],attachments:[],created:td()},data);
    S.projects.unshift(np);
  }
  saveDB().then(function(){closeMod();toast(eid?'Updated':'Deal created','ok');goTo('projects');if(eid&&S.sel)renPanel();});
}
</script>
</body>
